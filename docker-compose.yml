version: "3.8"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
  backend:
    image: karanjoshi09/yatramitra-backend:latest
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    restart: always
    depends_on:
      - db

  frontend:
    image: karanjoshi09/yatramitra-frontend:latest
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend

volumes:
  pgdata:
